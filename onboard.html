<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WDC — Complete Your Account</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #4A3728;
    --gold:    #A07840;
    --bg:      #FAF7F2;
    --surface: #FFFFFF;
    --border:  #E0D5C5;
    --text:    #2C2018;
    --text-dim:#8A7060;
    --danger:  #C02020;
    --success: #276C27;
    --radius:  10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--primary); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }

  .card {
    background: var(--surface); border-radius: 14px;
    width: 100%; max-width: 440px;
    box-shadow: 0 8px 40px rgba(0,0,0,.35); overflow: hidden;
  }
  .card-header {
    background: var(--primary); color: white;
    padding: 20px 24px;
  }
  .card-header .org  { font-size: 1rem; font-weight: 700; opacity: .8; }
  .card-header .title{ font-size: 1.3rem; font-weight: 700; margin-top: 2px; }
  .card-header .sub  { font-size: .82rem; opacity: .65; margin-top: 4px; }
  .card-body { padding: 24px; }

  .section-label {
    font-size: .7rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-dim);
    margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px;
  }
  .section-label:first-child { margin-top: 0; }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block; font-size: .8rem; font-weight: 600;
    color: var(--text-dim); margin-bottom: 4px;
  }
  .form-label .req { color: var(--danger); margin-left: 2px; }
  .form-input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: .9rem; background: var(--surface);
    color: var(--text); outline: none; transition: border-color .15s;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  .strength-bar {
    height: 4px; border-radius: 2px; margin-top: 6px;
    background: #eee; overflow: hidden;
  }
  .strength-fill {
    height: 100%; width: 0; border-radius: 2px;
    transition: width .3s, background .3s;
  }
  .strength-label { font-size: .75rem; color: var(--text-dim); margin-top: 4px; }

  .error-box {
    background: #fee; border: 1px solid #fcc; color: var(--danger);
    padding: 10px 14px; border-radius: 8px; font-size: .83rem;
    margin-bottom: 16px; display: none;
  }

  .btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    transition: opacity .15s; margin-top: 8px;
  }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: white; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.4); border-top-color: white;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading overlay */
  #loading {
    position: fixed; inset: 0; background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 1rem; z-index: 10;
  }
  #loading.hidden { display: none; }

  /* Success screen */
  #success-screen {
    display: none; text-align: center; padding: 40px 24px;
  }
  .success-icon { font-size: 3rem; margin-bottom: 16px; }
  .success-title { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .success-sub { font-size: .88rem; color: var(--text-dim); line-height: 1.5; }
  .redirect-note { font-size: .8rem; color: var(--text-dim); margin-top: 20px; }
</style>
</head>
<body>

<div id="loading">Verifying your invitation…</div>

<div class="card" id="main-card" style="display:none">

  <!-- Form screen -->
  <div id="form-screen">
    <div class="card-header">
      <div class="org">Wyoming Dinosaur Center</div>
      <div class="title">Complete Your Account</div>
      <div class="sub">Please fill in your details to finish setting up access.</div>
    </div>
    <div class="card-body">

      <div class="error-box" id="error-box"></div>

      <div class="section-label">Your Name</div>
      <div class="form-group">
        <label class="form-label">Full Name <span class="req">*</span></label>
        <input class="form-input" type="text" id="full-name" placeholder="Jane Smith" autocomplete="name">
      </div>

      <div class="section-label">Contact</div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input class="form-input" type="tel" id="phone" placeholder="(307) 555-0100" autocomplete="tel">
      </div>
      <div class="form-group">
        <label class="form-label">Street Address</label>
        <input class="form-input" type="text" id="address-street" placeholder="123 Main St" autocomplete="address-line1">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">City</label>
          <input class="form-input" type="text" id="address-city" placeholder="Thermopolis" autocomplete="address-level2">
        </div>
        <div class="form-group" style="max-width:80px">
          <label class="form-label">State</label>
          <input class="form-input" type="text" id="address-state" placeholder="WY" maxlength="2" autocomplete="address-level1">
        </div>
        <div class="form-group" style="max-width:100px">
          <label class="form-label">ZIP</label>
          <input class="form-input" type="text" id="address-zip" placeholder="82443" maxlength="10" autocomplete="postal-code">
        </div>
      </div>

      <div class="section-label">Set Your Password</div>
      <div class="form-group">
        <label class="form-label">Password <span class="req">*</span></label>
        <input class="form-input" type="password" id="password" placeholder="At least 8 characters"
               autocomplete="new-password" oninput="checkStrength()">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password <span class="req">*</span></label>
        <input class="form-input" type="password" id="password-confirm" placeholder="Re-enter password"
               autocomplete="new-password">
      </div>

      <button class="btn btn-primary" id="submit-btn" onclick="doSubmit()">
        Complete Account Setup
      </button>

    </div>
  </div>

  <!-- Success screen -->
  <div id="success-screen">
    <div class="success-icon">🦕</div>
    <div class="success-title">You're all set!</div>
    <div class="success-sub">Your account has been created.<br>Taking you to the app…</div>
    <div class="redirect-note" id="redirect-note"></div>
  </div>

</div>

<script>
const SUPABASE_URL  = 'https://xgvulkoqtqvgyprggvay.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhndnVsa29xdHF2Z3lwcmdndmF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MjEwNTUsImV4cCI6MjA5Nzk5NzA1NX0.-918Ro2JqRI251SgZPpMmpi0gfxrM6jUSGuXz7tBYVE';
const FIELD_URL     = 'https://wyomingdinosaurcenter.github.io/field/';
const ADMIN_URL     = 'https://wyomingdinosaurcenter.github.io/admin/';

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  // Parse access_token / refresh_token from URL hash (magic link)
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const accessToken  = params.get('access_token');
  const refreshToken = params.get('refresh_token');

  let session = null;

  if (accessToken && refreshToken) {
    // Explicitly load the session from the magic link tokens
    const { data, error } = await db.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken
    });
    if (!error) session = data.session;
  } else {
    // Fall back to stored session (e.g. page refresh)
    const { data } = await db.auth.getSession();
    session = data.session;
  }

  if (session?.user) {
    currentUser = session.user;
    // Clear the hash so the token isn't reused on refresh
    history.replaceState(null, '', window.location.pathname);

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main-card').style.display = 'block';

    // Pre-fill name if we have something real
    const meta = session.user.user_metadata;
    if (meta?.full_name && meta.full_name !== session.user.email) {
      document.getElementById('full-name').value = meta.full_name;
    }
  } else {
    document.getElementById('loading').textContent =
      'This link has expired or has already been used. Please contact your administrator for a new link.';
  }
}

init();

// ── PASSWORD STRENGTH ─────────────────────────────────────────
function checkStrength() {
  const pw = document.getElementById('password').value;
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w: '0%',   bg: '#eee',          text: '' },
    { w: '25%',  bg: 'var(--danger)', text: 'Weak' },
    { w: '50%',  bg: '#E09020',       text: 'Fair' },
    { w: '75%',  bg: '#A07840',       text: 'Good' },
    { w: '100%', bg: 'var(--success)',text: 'Strong' },
  ];
  const lvl = levels[Math.min(score, 4)];
  fill.style.width = lvl.w;
  fill.style.background = lvl.bg;
  label.textContent = lvl.text;
}

// ── SUBMIT ────────────────────────────────────────────────────
async function doSubmit() {
  const fullName  = document.getElementById('full-name').value.trim();
  const phone     = document.getElementById('phone').value.trim();
  const street    = document.getElementById('address-street').value.trim();
  const city      = document.getElementById('address-city').value.trim();
  const state     = document.getElementById('address-state').value.trim().toUpperCase();
  const zip       = document.getElementById('address-zip').value.trim();
  const password  = document.getElementById('password').value;
  const confirm   = document.getElementById('password-confirm').value;
  const errEl     = document.getElementById('error-box');
  const btn       = document.getElementById('submit-btn');

  errEl.style.display = 'none';

  // Validate
  if (!fullName) return showError('Please enter your full name.');
  if (password.length < 8) return showError('Password must be at least 8 characters.');
  if (password !== confirm) return showError('Passwords do not match.');

  btn.innerHTML = '<span class="spinner"></span> Saving…';
  btn.disabled = true;

  // Build mailing address string
  const addressParts = [street, city, state, zip].filter(Boolean);
  const mailingAddress = addressParts.length
    ? [street, `${city}${city && state ? ', ' : ''}${state} ${zip}`.trim()].filter(Boolean).join('\n')
    : '';

  // 1. Set password + user metadata
  const { error: updateErr } = await db.auth.updateUser({
    password,
    data: { full_name: fullName, phone, mailing_address: mailingAddress }
  });
  if (updateErr) { showError(updateErr.message); reset(); return; }

  // 2. Update profile
  const { error: profileErr } = await db
    .from('profiles')
    .update({ full_name: fullName, phone, mailing_address: mailingAddress })
    .eq('id', currentUser.id);
  if (profileErr) { showError(profileErr.message); reset(); return; }

  // 3. Show success then redirect
  showSuccess();
}

function showSuccess() {
  document.getElementById('form-screen').style.display = 'none';
  document.getElementById('success-screen').style.display = 'block';

  // Determine redirect based on role
  redirectAfterDelay();
}

async function redirectAfterDelay() {
  const { data: profile } = await db
    .from('profiles').select('role').eq('id', currentUser.id).single();

  const dest = profile?.role === 'admin' ? ADMIN_URL : FIELD_URL;
  const appName = profile?.role === 'admin' ? 'Admin Console' : 'Field App';

  document.getElementById('redirect-note').textContent =
    `Redirecting to ${appName} in a moment…`;

  setTimeout(() => { window.location.href = dest; }, 2500);
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
}

function reset() {
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Complete Account Setup';
  btn.disabled = false;
}
</script>
</body>
</html>
