<?xml version="1.0" encoding="UTF-8"?>
<!-- Generic fallback flag: used for Indeterminate / Other, or any species
     with no icon yet. Gray ring + bone silhouette. Rasterize to _fallback.png. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <circle cx="256" cy="256" r="232" fill="#FAF7F2"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="#8A7060" stroke-width="24"/>
  <!-- Simple bone silhouette (diagonal) -->
  <g fill="#1A1714" transform="rotate(-35 256 256)">
    <rect x="176" y="236" width="160" height="40" rx="20"/>
    <circle cx="176" cy="230" r="34"/>
    <circle cx="176" cy="282" r="34"/>
    <circle cx="336" cy="230" r="34"/>
    <circle cx="336" cy="282" r="34"/>
  </g>
</svg>
